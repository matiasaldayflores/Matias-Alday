# Anet ET4 + PETG — PrusaSlicer-format config (importable in OrcaSlicer: File > Import > Import Configs)
# Conservative, calibration-friendly baseline. Tune flow + retraction with OrcaSlicer's calibration menu.

# --- Printer ---
bed_shape = 0x0,220x0,220x220,0x220
max_print_height = 250
nozzle_diameter = 0.4
printer_model = Anet ET4 (custom board)
gcode_flavor = marlin
retract_length = 5
retract_speed = 40
retract_lift = 0.2
deretract_speed = 30
use_relative_e_distances = 0

# --- Filament: PETG ---
filament_type = PETG
temperature = 235
first_layer_temperature = 240
bed_temperature = 75
first_layer_bed_temperature = 80
fan_always_on = 1
min_fan_speed = 30
max_fan_speed = 50
bridge_fan_speed = 80
disable_fan_first_layers = 3
filament_retract_length = nil

# --- Print (0.2 mm quality) ---
layer_height = 0.2
first_layer_height = 0.24
perimeters = 3
top_solid_layers = 5
bottom_solid_layers = 4
fill_density = 25%
fill_pattern = gyroid
perimeter_speed = 40
external_perimeter_speed = 25
infill_speed = 50
first_layer_speed = 18
travel_speed = 120
brim_width = 0
skirts = 2
support_material = 0
support_material_threshold = 50
extrusion_multiplier = 0.97
# PETG sticks too well to PEI/glass: never bed-temp > 85, consider glue stick as release agent

# --- Start/End G-code (generic Marlin, safe for custom boards) ---
start_gcode = G90\nM83\nM140 S[first_layer_bed_temperature]\nM104 S[first_layer_temperature]\nG28\nM190 S[first_layer_bed_temperature]\nM109 S[first_layer_temperature]\nG1 Z5 F3000\nG1 X5 Y10 Z0.28 F3000\nG1 X150 Y10 E12 F1500\nG1 Z1 F3000
end_gcode = M104 S0\nM140 S0\nG91\nG1 Z10 F3000\nG90\nG1 X0 Y200 F6000\nM84
